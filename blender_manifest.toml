schema_version = "1.0.0"
id = "TextHelper"
name = "Text Helper"
tagline = "Easy text input & font management"
version = "2.1.10"
type = "add-on"
maintainer = "ACGGIT <1132692358@qq.com>"

blender_version_min = "5.2.0"

website = "https://github.com/AIGODLIKE/TextHelper"
support = "https://github.com/AIGODLIKE/TextHelper/issues"

tags = ["Text Editor"]
license = ["SPDX:GPL-3.0-or-later"]
copyright = ["2024-2026 ACGGIT"]

[permissions]
files = "Load fonts from disk and cache font preview thumbnails"
clipboard = "Paste text into the active text object"

[build]
paths_exclude_pattern = [
    "__pycache__/",
    "/.git/",
    "githooks/",
    ".gitignore",
    ".gitattributes",
    "README.md",
    "README.zh-CN.md",
    "RELEASE_NOTES*.md",
    "/*.zip",
    "*.blend1",
    ".vscode/",
    ".idea/",
    ".DS_Store",
    "Thumbs.db",
    "assets/",
    "i18n/_audit_*.py",
    "i18n/_append_*.py",
    "i18n/_list_*.py",
    "i18n/_generate_*.py",
]
